<!DOCTYPE html>
<meta charset="UTF-8">
<html ng-app="candidaturesApp">
<head>
  <title>Gestion de mes candidatures</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/controllers.js"></script>
  <script src="js/services.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" ng-controller="CandidaturesCtrl">
    <h1>Mes candidatures</h1>

    <!-- Formulaire d'ajout -->
    <form ng-submit="ajouterCandidature()">
      <input ng-model="nouvelleCandidature.entreprise" placeholder="Entreprise" required>
      <input ng-model="nouvelleCandidature.poste" placeholder="Poste" required>
      <input ng-model="nouvelleCandidature.lieu" placeholder="Site du poste">
      <select ng-model="nouvelleCandidature.statut">
        <option value="En attente">En attente</option>
        <option value="Entretien">Entretien</option>
        <option value="Refusé">Refusé</option>
      </select>
      <button type="submit" class="btn btn-primary">Ajouter</button>

    </form>

    <!-- Liste des candidatures -->
    <table class="table">
      <thead>
        <tr>
          <th>Entreprise</th>
          <th>Poste</th>
          <th>Lieu</th>
          <th>Statut</th>
          <th>Actions</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr ng-repeat="candidature in candidatures track by $index">
          <td>{{ candidature.entreprise }}</td>
          <td>{{ candidature.poste }}</td>
          <td>{{ candidature.lieu }}</td>
          <td>{{ candidature.statut }}</td>
          <td>
            <button ng-click="supprimerCandidature($index)" class="btn btn-danger">Supprimer</button>
            <button ng-click="modifCandidature($index, $candidature)" class="btn btn-danger">Modifier le statut</button>
          </td>
          <td>
            <button class="btn btn-star">Star button</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
